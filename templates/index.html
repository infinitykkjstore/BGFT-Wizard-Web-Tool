<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGFT Payload Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; text-shadow: 0 0 10px #00ff00; }
        .status-box {
            background: #111;
            border: 1px solid #00ff00;
            padding: 15px;
            margin-bottom: 20px;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 1s infinite;
        }
        .status-ready { background: #00ff00; }
        .status-loading { background: #ffff00; }
        .status-error { background: #ff0000; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #00cc00; }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #004400;
            color: #00ff00;
            font-family: inherit;
            font-size: 14px;
        }
        .input-group input:focus { outline: none; border-color: #00ff00; }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: #002200;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { background: #00ff00; color: #000; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .logs-box {
            background: #000;
            border: 1px solid #004400;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            font-size: 12px;
            margin-top: 20px;
        }
        .log-line { margin-bottom: 3px; }
        .log-error { color: #ff0000; }
        .log-success { color: #00ff00; }
        
        .result-box {
            display: none;
            background: #111;
            border: 1px solid #00ff00;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        .result-box.show { display: block; }
        .download-link {
            display: inline-block;
            padding: 10px 20px;
            background: #00ff00;
            color: #000;
            text-decoration: none;
            margin-top: 10px;
        }
        
        .meta-card {
            display: none;
            background: #111;
            border: 1px solid #004400;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .meta-card.show { display: block; }
        .meta-icon {
            width: 128px;
            height: 128px;
            margin: 0 auto 15px;
            border: 2px solid #00ff00;
            display: block;
        }
        .meta-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            text-align: left;
            font-size: 13px;
        }
        .meta-label { color: #00aa00; }
        .meta-value { color: #00ff00; }
        .meta-full { grid-column: 1 / -1; }
        
        .spinner {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .spinner.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BGFT Payload Builder</h1>
        
        <div class="status-box">
            <span class="status-indicator" id="statusDot"></span>
            <span id="statusText">Checking environment...</span>
        </div>
        
        <div class="input-group">
            <label>Package URL (PKG or Manifest)</label>
            <input type="text" id="pkgUrl" placeholder="https://...pkg or ...manifest.json">
        </div>
        
        <button class="btn" id="fetchBtn">Fetch Metadata</button>
        
        <div class="meta-card" id="metaCard">
            <img id="metaIcon" class="meta-icon">
            <div class="meta-details">
                <div class="meta-full"><span class="meta-label">Title:</span> <span class="meta-value" id="metaTitle"></span></div>
                <div><span class="meta-label">ID:</span> <span class="meta-value" id="metaTitleId"></span></div>
                <div><span class="meta-label">Type:</span> <span class="meta-value" id="metaType"></span></div>
                <div><span class="meta-label">Size:</span> <span class="meta-value" id="metaSize"></span></div>
                <div class="meta-full"><span class="meta-label">Category:</span> <span class="meta-value" id="metaCategory"></span></div>
            </div>
            <button class="btn" id="buildBtn" style="margin-top:15px;">Build Payload</button>
        </div>
        
        <div class="spinner" id="spinner">
            <h2>Compiling...</h2>
        </div>
        
        <div class="result-box" id="resultBox">
            <h2>Build Complete!</h2>
            <p id="resultSize"></p>
            <a class="download-link" id="downloadLink" href="#">Download payload.bin</a>
        </div>
        
        <div class="logs-box" id="logsBox"></div>
    </div>
    
    <script>
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const logsBox = document.getElementById('logsBox');
        const fetchBtn = document.getElementById('fetchBtn');
        const buildBtn = document.getElementById('buildBtn');
        const metaCard = document.getElementById('metaCard');
        const spinner = document.getElementById('spinner');
        const resultBox = document.getElementById('resultBox');
        const downloadLink = document.getElementById('downloadLink');
        
        let ready = false;
        let currentMeta = null;
        
        function updateStatus(state, text) {
            statusDot.className = 'status-indicator ' + state;
            statusText.textContent = text;
        }
        
        function addLog(msg, type = '') {
            const div = document.createElement('div');
            div.className = 'log-line ' + type;
            div.textContent = msg;
            logsBox.appendChild(div);
            logsBox.scrollTop = logsBox.scrollHeight;
        }
        
        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                data.logs.forEach(l => {
                    if (!logsBox.textContent.includes(l)) addLog(l);
                });
                
                if (data.ready) {
                    ready = true;
                    updateStatus('status-ready', 'Ready');
                    fetchBtn.disabled = false;
                } else if (data.error) {
                    updateStatus('status-error', 'Error: ' + data.error);
                } else {
                    updateStatus('status-loading', 'Setting up...');
                    fetchBtn.disabled = true;
                }
            } catch (e) { console.error(e); }
        }
        
        fetchBtn.addEventListener('click', async () => {
            const url = document.getElementById('pkgUrl').value.trim();
            if (!url) return;
            
            fetchBtn.disabled = true;
            fetchBtn.textContent = 'Fetching...';
            
            try {
                const res = await fetch('/api/meta?url=' + encodeURIComponent(url));
                const data = await res.json();
                
                fetchBtn.disabled = false;
                fetchBtn.textContent = 'Fetch Metadata';
                
                if (data.success) {
                    currentMeta = data;
                    document.getElementById('metaTitle').textContent = data.title || 'N/A';
                    document.getElementById('metaTitleId').textContent = data.title_id || 'N/A';
                    document.getElementById('metaType').textContent = data.pkg_type || 'PS4GD';
                    document.getElementById('metaSize').textContent = ((data.pkg_size || 0) / 1024 / 1024 / 1024).toFixed(2) + ' GB';
                    document.getElementById('metaCategory').textContent = data.category || 'gd';
                    
                    if (data.icon_path) {
                        document.getElementById('metaIcon').src = data.icon_path;
                    }
                    
                    metaCard.classList.add('show');
                    addLog('Metadata: ' + data.title, 'log-success');
                } else {
                    addLog('Error: ' + data.error, 'log-error');
                }
            } catch (e) {
                fetchBtn.disabled = false;
                fetchBtn.textContent = 'Fetch Metadata';
                addLog('Error: ' + e.message, 'log-error');
            }
        });
        
        buildBtn.addEventListener('click', async () => {
            if (!ready || !currentMeta) return;
            
            buildBtn.disabled = true;
            spinner.classList.add('show');
            resultBox.classList.remove('show');
            
            try {
                const params = new URLSearchParams({
                    url: document.getElementById('pkgUrl').value,
                    name: currentMeta.title,
                    id: currentMeta.title_id,
                    icon: currentMeta.icon_path || '',
                    type: currentMeta.pkg_type,
                    size: currentMeta.pkg_size
                });
                
                const res = await fetch('/api/build?' + params);
                const data = await res.json();
                
                spinner.classList.remove('show');
                buildBtn.disabled = false;
                
                if (data.success) {
                    document.getElementById('resultSize').textContent = 'Size: ' + (data.size / 1024 / 1024).toFixed(2) + ' MB';
                    downloadLink.href = '/api/download/' + data.file;
                    resultBox.classList.add('show');
                    addLog('Build complete!', 'log-success');
                } else {
                    addLog('Error: ' + data.error, 'log-error');
                }
            } catch (e) {
                spinner.classList.remove('show');
                buildBtn.disabled = false;
                addLog('Error: ' + e.message, 'log-error');
            }
        });
        
        checkStatus();
        setInterval(checkStatus, 2000);
    </script>
</body>
</html>
