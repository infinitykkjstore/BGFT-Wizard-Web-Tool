<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGFT Payload Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; text-shadow: 0 0 10px #00ff00; }
        .status-box {
            background: #111;
            border: 1px solid #00ff00;
            padding: 15px;
            margin-bottom: 20px;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 1s infinite;
        }
        .status-ready { background: #00ff00; }
        .status-loading { background: #ffff00; }
        .status-error { background: #ff0000; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #00cc00; }
        input {
            width: 100%;
            padding: 10px;
            background: #111;
            border: 1px solid #004400;
            color: #00ff00;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: #00ff00; }
        .btn {
            width: 100%;
            padding: 15px;
            background: #002200;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover { background: #00ff00; color: #000; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .logs-box {
            background: #000;
            border: 1px solid #004400;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            font-size: 12px;
        }
        .log-line { margin-bottom: 3px; }
        .log-error { color: #ff0000; }
        .log-success { color: #00ff00; }
        .result-box {
            display: none;
            background: #111;
            border: 1px solid #00ff00;
            padding: 20px;
            margin-top: 20px;
        }
        .result-box.show { display: block; }
        .download-link {
            display: inline-block;
            padding: 10px 20px;
            background: #00ff00;
            color: #000;
            text-decoration: none;
            margin-top: 10px;
        }
        .spinner { display: none; text-align: center; padding: 20px; }
        .spinner.show { display: block; }
        
        .meta-card {
            background: #111;
            border: 1px solid #004400;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .meta-card.hidden { display: none; }
        .meta-card img {
            width: 128px;
            height: 128px;
            border: 2px solid #00aa00;
        }
        .meta-details {
            flex: 1;
        }
        .meta-details h2 {
            margin-bottom: 10px;
            color: #00ff00;
        }
        .meta-details p {
            margin: 5px 0;
            color: #00aa00;
            font-size: 14px;
        }
        .meta-details .pkg-id {
            color: #ffff00;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BGFT Payload Builder</h1>
        
        <div class="status-box">
            <span class="status-indicator" id="statusDot"></span>
            <span id="statusText">Checking environment...</span>
        </div>
        
        <div class="form-group">
            <label>Package URL (PKG or Manifest)</label>
            <input type="text" id="pkgUrl" placeholder="https://...pkg or ...manifest.json">
            <button type="button" class="btn" id="fetchBtn">Fetch & Build</button>
        </div>
        
        <div class="meta-card hidden" id="metaCard">
            <img id="iconImg" src="" alt="Icon">
            <div class="meta-details">
                <h2 id="metaTitle">-</h2>
                <p class="pkg-id" id="metaId">-</p>
                <p id="metaType">-</p>
                <p id="metaSize">-</p>
                <p id="metaCategory">-</p>
                <button type="button" class="btn" id="buildBtn">Build Payload</button>
            </div>
        </div>
        
        <div class="spinner" id="spinner">
            <h2>Processing...</h2>
        </div>
        
        <div class="result-box" id="resultBox">
            <h2>Build Complete!</h2>
            <p id="resultInfo"></p>
            <a class="download-link" id="downloadLink" href="#">Download payload.bin</a>
            <button type="button" class="btn" id="newBtn" style="margin-top:10px;padding:10px;">New Payload</button>
        </div>
        
        <h2 style="margin-top: 30px;">Logs</h2>
        <div class="logs-box" id="logsBox"></div>
    </div>
    
    <script>
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const logsBox = document.getElementById('logsBox');
        const pkgUrl = document.getElementById('pkgUrl');
        const fetchBtn = document.getElementById('fetchBtn');
        const metaCard = document.getElementById('metaCard');
        const iconImg = document.getElementById('iconImg');
        const metaTitle = document.getElementById('metaTitle');
        const metaId = document.getElementById('metaId');
        const metaType = document.getElementById('metaType');
        const metaSize = document.getElementById('metaSize');
        const metaCategory = document.getElementById('metaCategory');
        const buildBtn = document.getElementById('buildBtn');
        const spinner = document.getElementById('spinner');
        const resultBox = document.getElementById('resultBox');
        const resultInfo = document.getElementById('resultInfo');
        const downloadLink = document.getElementById('downloadLink');
        const newBtn = document.getElementById('newBtn');
        
        let currentMeta = null;
        let ready = false;
        
        function log(msg, type = '') {
            const div = document.createElement('div');
            div.className = 'log-line ' + type;
            div.textContent = '[' + new Date().toTimeString().slice(0,8) + '] ' + msg;
            logsBox.appendChild(div);
            logsBox.scrollTop = logsBox.scrollHeight;
        }
        
        function updateStatus(state, text) {
            statusDot.className = 'status-indicator ' + state;
            statusText.textContent = text;
        }
        
        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                data.logs.slice(-20).forEach(l => {
                    if (!logsBox.textContent.includes(l)) log(l);
                });
                ready = data.ready;
                updateStatus(ready ? 'status-ready' : 'status-loading', ready ? 'Ready' : 'Setting up...');
            } catch (e) { console.error(e); }
        }
        
        async function fetchMetadata() {
            const url = pkgUrl.value.trim();
            if (!url) { log('Enter URL', 'log-error'); return; }
            
            fetchBtn.disabled = true;
            fetchBtn.textContent = 'Fetching...';
            spinner.classList.add('show');
            
            try {
                const res = await fetch('/api/meta?url=' + encodeURIComponent(url));
                const data = await res.json();
                
                fetchBtn.disabled = false;
                fetchBtn.textContent = 'Fetch & Build';
                spinner.classList.remove('show');
                
                if (data.success) {
                    currentMeta = { url, ...data };
                    iconImg.src = data.icon_path || '';
                    metaTitle.textContent = data.title || 'Unknown';
                    metaId.textContent = data.title_id || '-';
                    metaType.textContent = 'Type: ' + (data.pkg_type || 'PS4GD');
                    metaSize.textContent = 'Size: ' + ((data.pkg_size || 0) / 1024 / 1024 / 1024).toFixed(2) + ' GB';
                    metaCategory.textContent = 'Category: ' + (data.category || 'gd');
                    metaCard.classList.remove('hidden');
                    log('Loaded: ' + data.title, 'log-success');
                } else {
                    log('Error: ' + data.error, 'log-error');
                }
            } catch (e) {
                fetchBtn.disabled = false;
                fetchBtn.textContent = 'Fetch & Build';
                spinner.classList.remove('show');
                log('Error: ' + e.message, 'log-error');
            }
        }
        
        async function buildPayload() {
            if (!currentMeta || !ready) return;
            
            buildBtn.disabled = true;
            spinner.classList.add('show');
            resultBox.classList.remove('show');
            
            try {
                const params = new URLSearchParams({
                    url: currentMeta.url,
                    name: currentMeta.title,
                    id: currentMeta.title_id,
                    icon: currentMeta.icon_path || '',
                    type: currentMeta.pkg_type || 'PS4GD',
                    size: currentMeta.pkg_size || 0
                });
                
                const res = await fetch('/api/build?' + params);
                const data = await res.json();
                
                buildBtn.disabled = false;
                spinner.classList.remove('show');
                
                if (data.success) {
                    resultInfo.textContent = 'Size: ' + (data.size / 1024 / 1024).toFixed(2) + ' MB';
                    downloadLink.href = '/api/download/' + data.file;
                    resultBox.classList.add('show');
                    log('Build complete', 'log-success');
                } else {
                    log('Error: ' + data.error, 'log-error');
                }
            } catch (e) {
                buildBtn.disabled = false;
                spinner.classList.remove('show');
                log('Error: ' + e.message, 'log-error');
            }
        }
        
        function resetForm() {
            currentMeta = null;
            metaCard.classList.add('hidden');
            resultBox.classList.remove('show');
            pkgUrl.value = '';
        }
        
        fetchBtn.addEventListener('click', fetchMetadata);
        buildBtn.addEventListener('click', buildPayload);
        newBtn.addEventListener('click', resetForm);
        
        checkStatus();
        setInterval(checkStatus, 3000);
    </script>
</body>
</html>
