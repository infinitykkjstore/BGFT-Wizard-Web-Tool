<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGFT Payload Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .topbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .ps4-badge {
            display: none;
            padding: 8px 12px;
            background: #1a0f1a;
            border: 1px solid #ff00ff;
            color: #ff00ff;
            font-size: 12px;
            text-shadow: 0 0 5px #ff00ff;
        }
        .ps4-badge.show { display: inline-block; }
        .link-btn {
            display: inline-block;
            padding: 10px 14px;
            border: 1px solid #00ff00;
            color: #00ff00;
            text-decoration: none;
            background: #0f1a0f;
            transition: all 0.25s;
        }
        .link-btn:hover { background: #00ff00; color: #000; }
        h1 { text-align: center; margin-bottom: 30px; text-shadow: 0 0 10px #00ff00; }
        .status-box {
            background: #111;
            border: 1px solid #00ff00;
            padding: 15px;
            margin-bottom: 20px;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 1s infinite;
        }
        .status-ready { background: #00ff00; }
        .status-loading { background: #ffff00; }
        .status-error { background: #ff0000; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #00cc00; }
        input {
            width: 100%;
            padding: 10px;
            background: #111;
            border: 1px solid #004400;
            color: #00ff00;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: #00ff00; }
        .btn {
            width: 100%;
            padding: 15px;
            background: #002200;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover { background: #00ff00; color: #000; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-inject {
            background: #220033;
            border: 1px solid #ff00ff;
            color: #ff00ff;
        }
        .btn-inject:hover { background: #ff00ff; color: #000; }
        .btn-inject:disabled { opacity: 0.5; cursor: not-allowed; }
        .logs-box {
            background: #000;
            border: 1px solid #004400;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            font-size: 12px;
        }
        .log-line { margin-bottom: 3px; }
        .log-error { color: #ff0000; }
        .log-success { color: #00ff00; }
        .log-ps4 { color: #ff00ff; }
        .result-box {
            display: none;
            background: #111;
            border: 1px solid #00ff00;
            padding: 20px;
            margin-top: 20px;
        }
        .result-box.show { display: block; }
        .result-box.ps4-mode {
            border-color: #ff00ff;
        }
        .download-link {
            display: inline-block;
            padding: 10px 20px;
            background: #00ff00;
            color: #000;
            text-decoration: none;
            margin-top: 10px;
        }
        .inject-btn {
            display: inline-block;
            padding: 12px 24px;
            background: #ff00ff;
            color: #000;
            text-decoration: none;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.25s;
        }
        .inject-btn:hover { background: #cc00cc; }
        .inject-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .inject-log {
            margin-top: 10px;
            padding: 10px;
            background: #0a050a;
            border: 1px solid #440044;
            color: #ff00ff;
            font-size: 12px;
            white-space: pre-wrap;
            display: none;
        }
        .inject-log.show { display: block; }
        .spinner { display: none; text-align: center; padding: 20px; }
        .spinner.show { display: block; }

        .meta-card {
            background: #111;
            border: 1px solid #004400;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .meta-card.hidden { display: none; }
        .meta-card.ps4-mode {
            border-color: #ff00ff;
        }
        .meta-card img {
            width: 128px;
            height: 128px;
            border: 2px solid #00aa00;
        }
        .meta-details {
            flex: 1;
        }
        .meta-details h2 {
            margin-bottom: 10px;
            color: #00ff00;
        }
        .meta-details p {
            margin: 5px 0;
            color: #00aa00;
            font-size: 14px;
        }
        .meta-details .pkg-id {
            color: #ffff00;
            font-size: 16px;
        }
        @media (max-width: 820px) {
            .meta-card { flex-direction: column; align-items: center; }
            .meta-details { width: 100%; }
            .topbar { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <span class="ps4-badge" id="ps4Badge">PS4 Identificado! FW: ---</span>
            <a class="link-btn" href="/docs">API Documentation</a>
        </div>
        <h1>BGFT Payload Builder</h1>

        <div class="status-box">
            <span class="status-indicator" id="statusDot"></span>
            <span id="statusText">Checking environment...</span>
        </div>

        <div class="form-group">
            <label>Package URL (PKG or Manifest)</label>
            <input type="text" id="pkgUrl" placeholder="https://...pkg or ...manifest.json">
            <button type="button" class="btn" id="fetchBtn">Fetch & Build</button>
        </div>

        <div class="meta-card hidden" id="metaCard">
            <img id="iconImg" src="" alt="Icon">
            <div class="meta-details">
                <h2 id="metaTitle">-</h2>
                <p class="pkg-id" id="metaId">-</p>
                <p id="metaType">-</p>
                <p id="metaSize">-</p>
                <p id="metaCategory">-</p>
                <button type="button" class="btn" id="buildBtn">Build Payload</button>
            </div>
        </div>

        <div class="spinner" id="spinner">
            <h2>Processing...</h2>
        </div>

        <div class="result-box" id="resultBox">
            <h2 id="resultTitle">Build Complete!</h2>
            <p id="resultInfo"></p>
            <a class="download-link" id="downloadLink" href="#">Download payload.bin</a>
            <button type="button" class="inject-btn" id="injectBtn" style="display:none;">Inject Payload to PS4</button>
            <pre class="inject-log" id="injectLog"></pre>
            <button type="button" class="btn" id="newBtn" style="margin-top:10px;padding:10px;">New Payload</button>
        </div>

        <h2 style="margin-top: 30px;">Logs</h2>
        <div class="logs-box" id="logsBox"></div>
    </div>

    <script>
        const BINLOADER_URL = "http://127.0.0.1:9090";

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const logsBox = document.getElementById('logsBox');
        const pkgUrl = document.getElementById('pkgUrl');
        const fetchBtn = document.getElementById('fetchBtn');
        const metaCard = document.getElementById('metaCard');
        const iconImg = document.getElementById('iconImg');
        const metaTitle = document.getElementById('metaTitle');
        const metaId = document.getElementById('metaId');
        const metaType = document.getElementById('metaType');
        const metaSize = document.getElementById('metaSize');
        const metaCategory = document.getElementById('metaCategory');
        const buildBtn = document.getElementById('buildBtn');
        const spinner = document.getElementById('spinner');
        const resultBox = document.getElementById('resultBox');
        const resultTitle = document.getElementById('resultTitle');
        const resultInfo = document.getElementById('resultInfo');
        const downloadLink = document.getElementById('downloadLink');
        const injectBtn = document.getElementById('injectBtn');
        const injectLog = document.getElementById('injectLog');
        const newBtn = document.getElementById('newBtn');
        const ps4Badge = document.getElementById('ps4Badge');

        let currentMeta = null;
        let ready = false;
        let currentFile = null;
        let isPS4 = false;
        const seenServerLines = new Set();

        function detectPS4() {
            const ua = navigator.userAgent;
            const ps4Match = ua.match(/PlayStation\s*4\/([\d.]+)/);
            if (ps4Match) {
                isPS4 = true;
                ps4Badge.textContent = 'PS4 Identificado! FW: ' + ps4Match[1];
                ps4Badge.classList.add('show');
            }
        }

        function log(msg, type = '') {
            const div = document.createElement('div');
            div.className = 'log-line ' + type;
            div.textContent = msg.startsWith('[') ? msg : ('[' + new Date().toTimeString().slice(0,8) + '] ' + msg);
            logsBox.appendChild(div);
            logsBox.scrollTop = logsBox.scrollHeight;
        }

        function updateStatus(state, text) {
            statusDot.className = 'status-indicator ' + state;
            statusText.textContent = text;
        }

        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                ready = data.ready;
                updateStatus(ready ? 'status-ready' : 'status-loading', ready ? 'Ready' : 'Setting up...');
            } catch (e) { console.error(e); }
        }

        async function pollUserLogs() {
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();
                (data.logs || []).forEach(line => {
                    if (!seenServerLines.has(line)) {
                        seenServerLines.add(line);
                        log(line);
                    }
                });
            } catch (e) { console.error(e); }
        }

        async function fetchMetadata() {
            const url = pkgUrl.value.trim();
            if (!url) { log('Enter URL', 'log-error'); return; }

            fetchBtn.disabled = true;
            fetchBtn.textContent = 'Fetching...';
            spinner.classList.add('show');

            try {
                const res = await fetch('/api/meta?url=' + encodeURIComponent(url));
                const data = await res.json();

                fetchBtn.disabled = false;
                fetchBtn.textContent = 'Fetch & Build';
                spinner.classList.remove('show');

                if (data.success) {
                    currentMeta = { url, ...data };
                    iconImg.src = data.icon_path || '';
                    metaTitle.textContent = data.title || 'Unknown';
                    metaId.textContent = data.content_id || data.title_id || '-';
                    metaType.textContent = 'Type: ' + (data.pkg_type || 'PS4GD');
                    metaSize.textContent = 'Size: ' + ((data.pkg_size || 0) / 1024 / 1024 / 1024).toFixed(2) + ' GB';
                    metaCategory.textContent = 'Category: ' + (data.category || 'gd');
                    metaCard.classList.remove('hidden');

                    if (isPS4) {
                        metaCard.classList.add('ps4-mode');
                    }

                    log('Loaded: ' + data.title, 'log-success');
                } else {
                    log('Error: ' + data.error, 'log-error');
                }
            } catch (e) {
                fetchBtn.disabled = false;
                fetchBtn.textContent = 'Fetch & Build';
                spinner.classList.remove('show');
                log('Error: ' + e.message, 'log-error');
            }
        }

        async function buildPayload() {
            if (!currentMeta || !ready) return;

            buildBtn.disabled = true;
            spinner.classList.add('show');
            resultBox.classList.remove('show');

            try {
                const params = new URLSearchParams({
                    url: currentMeta.url,
                    name: currentMeta.title,
                    id: currentMeta.content_id || currentMeta.title_id,
                    icon: currentMeta.icon_path || '',
                    type: currentMeta.pkg_type || 'PS4GD',
                    size: currentMeta.pkg_size || 0
                });

                const res = await fetch('/api/build?' + params);
                const data = await res.json();

                buildBtn.disabled = false;
                spinner.classList.remove('show');

                if (data.success) {
                    currentFile = data.file;
                    resultInfo.textContent = 'Size: ' + (data.size / 1024 / 1024).toFixed(2) + ' MB';
                    resultBox.classList.add('show');

                    if (isPS4) {
                        resultBox.classList.add('ps4-mode');
                        resultTitle.textContent = 'Build Complete!';
                        downloadLink.style.display = 'none';
                        injectBtn.style.display = 'inline-block';
                    } else {
                        downloadLink.href = '/api/download/' + data.file;
                        downloadLink.style.display = 'inline-block';
                        injectBtn.style.display = 'none';
                    }

                    log('Build complete', 'log-success');
                } else {
                    log('Error: ' + data.error, 'log-error');
                }
            } catch (e) {
                buildBtn.disabled = false;
                spinner.classList.remove('show');
                log('Error: ' + e.message, 'log-error');
            }
        }

        async function injectPayload() {
            if (!currentFile) return;

            injectBtn.disabled = true;
            injectBtn.textContent = 'Injecting...';
            injectLog.classList.add('show');
            injectLog.textContent = 'Loading payload...\n';

            try {
                const response = await fetch('/api/download/' + currentFile);
                const data = await response.arrayBuffer();

                injectLog.textContent += 'Sending to binloader...\n';

                const result = await fetch(BINLOADER_URL, {
                    method: 'POST',
                    body: data
                });

                if (result.ok) {
                    injectLog.textContent += 'Payload injected successfully!\n';
                    log('Payload injected to PS4', 'log-ps4');
                } else {
                    injectLog.textContent += 'Failed to inject payload\n';
                    log('Inject failed', 'log-error');
                }
            } catch (e) {
                injectLog.textContent += 'Error: ' + e.message + '\n';
                log('Inject error: ' + e.message, 'log-error');
            }

            injectBtn.disabled = false;
            injectBtn.textContent = 'Inject Payload to PS4';
        }

        function resetForm() {
            currentMeta = null;
            currentFile = null;
            metaCard.classList.remove('hidden', 'ps4-mode');
            resultBox.classList.remove('show', 'ps4-mode');
            downloadLink.style.display = 'inline-block';
            injectBtn.style.display = 'none';
            injectLog.classList.remove('show');
            injectLog.textContent = '';
            pkgUrl.value = '';
        }

        detectPS4();

        fetchBtn.addEventListener('click', fetchMetadata);
        buildBtn.addEventListener('click', buildPayload);
        injectBtn.addEventListener('click', injectPayload);
        newBtn.addEventListener('click', resetForm);

        checkStatus();
        pollUserLogs();
        setInterval(checkStatus, 3000);
        setInterval(pollUserLogs, 1200);
    </script>
</body>
</html>
